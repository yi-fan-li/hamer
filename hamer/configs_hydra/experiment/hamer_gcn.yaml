# @package _global_

defaults:
  - default.yaml

GENERAL:
  TOTAL_STEPS: 200_000
  LOG_STEPS: 500
  VAL_STEPS: 1000
  CHECKPOINT_STEPS: 1000
  CHECKPOINT_SAVE_TOP_K: 1
  NUM_WORKERS: 2
  PREFETCH_FACTOR: 2

TRAIN:
  LR: 1e-5
  WEIGHT_DECAY: 1e-4
  BATCH_SIZE: 8
  LOSS_REDUCTION: mean
  NUM_TRAIN_SAMPLES: 2
  NUM_TEST_SAMPLES: 64
  POSE_2D_NOISE_RATIO: 0.01
  SMPL_PARAM_NOISE_RATIO: 0.005

MODEL:
  IMAGE_SIZE: 256
  IMAGE_MEAN: [0.485, 0.456, 0.406]
  IMAGE_STD: [0.229, 0.224, 0.225]
  # MODEL.BACKBONE / MANO_HEAD are not used directly by HAMERWithGCN;
  # they are read from the frozen HaMeR checkpoint's own saved config.
  BACKBONE:
    TYPE: dinov3
  MANO_HEAD:
    TYPE: transformer_decoder
    IN_CHANNELS: 2048
    TRANSFORMER_DECODER:
      depth: 6
      heads: 8
      mlp_dim: 1024
      dim_head: 64
      dropout: 0.0
      emb_dropout: 0.0
      norm: layer
      context_dim: 768

LOSS_WEIGHTS:
  KEYPOINTS_3D: 0.05
  KEYPOINTS_2D: 0.01
  # MANO parameter losses are unused (GCN only outputs joint deltas)
  GLOBAL_ORIENT: 0.0
  HAND_POSE: 0.0
  BETAS: 0.0
  ADVERSARIAL: 0.0

GCN:
  # Path to the pretrained frozen HaMeR checkpoint to refine.
  HAMER_CHECKPOINT: ???
  # DINOv3-B feature channels (768); update if using a different backbone.
  FEAT_CHANNELS: 768
  HIDDEN_DIM: 256
  NUM_LAYERS: 3
